; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
libr_dir = libraries
include_dir = inc
default_envs =
	OpenPPG CM0

[env:OpenPPG CM0]
platform = atmelsam@5.1.1
board = adafruit_feather_m0
framework = arduino
build_flags = -D USE_TINYUSB
lib_deps =
	Adafruit GFX Library@~1.10.10
	AceButton@~1.9.0
	Adafruit DRV2605 Library@~1.1.2
	Adafruit SSD1306@~2.4.6
	Adafruit SleepyDog Library@~1.4.0
	Adafruit TinyUSB Library@0.10.5
	ArduinoJson@~6.18.0
	ArduinoThread@~2.1.1
	ResponsiveAnalogRead@~1.2.1
	Time@1.6.1
	extEEPROM@^3.4.1
	adafruit/Adafruit BusIO@~1.7.5
	adafruit/Adafruit BMP3XX Library@~2.0.2
	https://github.com/rlogiacco/CircularBuffer#cf4ded93a099eb77c9451ee56b3eeaf31c69b7a3
lib_ignore =
	Adafruit Circuit Playground
	Adafruit seesaw Library

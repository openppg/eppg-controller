; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
lib_dir = libraries
include_dir = inc
src_dir = src/sp140
default_envs =
	OpenPPG-CESP32S3-CAN-SP140

[extra]
lib_ignore =
	Adafruit Circuit Playground
	Adafruit seesaw Library


[env:OpenPPG-CESP32S3-CAN-SP140]
platform = espressif32@6.13.0
board = m5stack-stamps3
framework = arduino, espidf
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.partitions = default_8MB.csv
; If esptool.py complains about missing intelhex, install into the tool package:
;   ~/.platformio/penv/bin/python -m pip install intelhex -t ~/.platformio/packages/tool-esptoolpy
extra_scripts =
	pre:extra_script.py
	merge-esp.py
build_flags =
	; -D SCREEN_DEBUG=false
	; -D SCREEN_DEBUG_STATIC=false
	-D LV_CONF_INCLUDE_SIMPLE
	-I inc/sp140/lvgl
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D CORE_DEBUG_LEVEL=2
	-D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192
	-Wno-error=format
	; NimBLE ble_hs.h: BLE_HS_HCI_ERR(x) uses (x) in ternary; GCC -Wint-in-bool-context is -Werror in IDF
	-Wno-error=int-in-bool-context
	;-D BLE_PAIR_ON_BOOT
	; Keep the unreferenced firmware version marker through linker --gc-sections
	-Wl,-u,fw_version_marker
build_type = debug
debug_speed = 12000
debug_tool = esp-builtin
lib_deps =
	Wire
	SPI
	ArduinoJson@7.4.3
	adafruit/Adafruit BusIO@1.17.4
	adafruit/Adafruit BMP3XX Library@2.1.6
	adafruit/Adafruit ST7735 and ST7789 Library@1.11.0
	adafruit/Adafruit NeoPixel@1.15.4
	adafruit/Adafruit CAN@0.2.3
	adafruit/Adafruit MCP2515@0.2.1
	https://github.com/rlogiacco/CircularBuffer@1.4.0
	https://github.com/openppg/SINE-ESC-CAN#2ab56a4e5b52e4456317c8ee3e3d802b232c6148
	https://github.com/openppg/ANT-BMS-CAN#fd54852bc6f1c9608e37af9ca7c13ea4135c095b
	lvgl/lvgl@^9.5.0
	h2zero/NimBLE-Arduino@^2.3.9
lib_ignore =
	Adafruit SleepyDog Library
	${extra.lib_ignore}
monitor_filters =
	esp32_exception_decoder
	time
monitor_speed = 115200

; TODO: "Make the release build actually meaningful" project
;
; Right now the release env differs from debug in three ways, none of which
; produce a behaviorally different firmware:
;
;   1. -DNDEBUG strips ~54 KB of ArduinoJson-internal __PRETTY_FUNCTION__
;      assert strings. Our app code has zero assert() calls, so this only
;      affects the library's internal error messages. Not a real win.
;
;   2. CORE_DEBUG_LEVEL 2->1 (INFO->WARN) does nothing because all logging
;      goes through USBSerial directly (333 calls), not ESP_LOGx (0 calls).
;      CORE_DEBUG_LEVEL only gates ESP_LOGx. This flag is currently a no-op.
;
;   3. Optimization stays at -Og (optimize-for-debug) in both envs because
;      the espressif32 platform framework controls it regardless of
;      build_type. No runtime performance difference at all.
;
; To make the release build genuinely worth shipping:
;
;   Step 1 — Adopt a structured logging layer
;     Replace the 333 raw USBSerial calls with ESP_LOGx macros (or thin
;     wrappers over them) with per-module TAGs. Then CORE_DEBUG_LEVEL=1
;     in release will actually compile out INFO messages, giving real flash
;     savings and a quieter production image. Bonus: logs become filterable
;     via idf.py monitor and the existing esp32_exception_decoder filter.
;
;   Step 2 — Fix the missing-field-initializers warnings properly
;     Five BMS threshold structs in inc/sp140/monitor_config.h are missing
;     .hysteresis = 0.0f (lines 17-21). bms.cpp:34-36 should use = {}
;     (value-initialize all members) instead of = {.bmsState = ...}.
;     Once fixed, remove -Wno-error=missing-field-initializers from below.
;
;   Step 3 — Validate -O2/-Os on the HIL rig, then flip
;     Add -O2 or -Os to the release build_flags and run the full HIL
;     throttle/arm/disarm test suite. The control loop (core 0) has a
;     hard 20ms deadline; higher optimization can shift timing enough to
;     matter on a safety-critical RT path. Only flip CI to ship the release
;     env after this validation passes.
;
; Until all three steps are done, CI stays on the debug env (see
; .github/workflows/config.yml) because the release build is not yet
; meaningfully better — just slightly smaller.
;
; Release/OTA build env — scaffold for the above work:
[env:OpenPPG-CESP32S3-CAN-SP140-release]
extends = env:OpenPPG-CESP32S3-CAN-SP140
build_type = release
; Share the debug env's sdkconfig so IDF system-level config stays in
; lockstep between envs; only app-level CFLAGS (NDEBUG, CORE_DEBUG_LEVEL)
; differ.
board_build.esp-idf.sdkconfig_path = sdkconfig.OpenPPG-CESP32S3-CAN-SP140
build_unflags =
	-D CORE_DEBUG_LEVEL=2
build_flags =
	${env:OpenPPG-CESP32S3-CAN-SP140.build_flags}
	-DNDEBUG
	-D CORE_DEBUG_LEVEL=1
	-Wno-error=missing-field-initializers

; Windows setup for native testing - install required packages:
; winget install MSYS2.MSYS2
; C:\msys64\usr\bin\bash -l -c "pacman -S --noconfirm mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-ninja"
; Add C:\msys64\ucrt64\bin to your PATH environment variable

[env:native-test]
platform = native
test_framework = googletest
build_type = debug
build_flags =
  -I inc
  -I test/native_stubs
  -I .pio/libdeps/native-test/CircularBuffer
  -D ARDUINO=1
build_src_filter = -<*>
test_ignore = neopixel*, test_screenshots
lib_deps =
  ArduinoJson@7.4.3
  rlogiacco/CircularBuffer@^1.4.0

[env:native-screenshot]
platform = native
test_framework = googletest
build_type = debug
build_flags =
  -I test/screenshot_stubs
  -I inc
  -I inc/sp140/lvgl
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_LVGL_H_INCLUDE_SIMPLE
  -D ARDUINO=1
  -D NATIVE_SCREENSHOT_TEST=1
  -std=c++17
build_src_filter =
  -<*>
  +<lvgl/lvgl_main_screen.cpp>
  +<lvgl/lvgl_updates.cpp>
  +<lvgl/lvgl_alerts.cpp>
test_filter = test_screenshots
lib_deps =
  lvgl/lvgl@^9.5.0
